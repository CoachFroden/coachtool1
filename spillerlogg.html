<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spillerlogg</title>

  <link rel="stylesheet" href="coach.css" />
</head>

<body>

  <main class="coach-container">

    <header class="coach-header">
      <h1>Spillerlogg</h1>
      <p class="coach-sub">Hvem har vært inne i appen</p>
    </header>

    <section id="logList" class="coach-grid">
      <div class="coach-card">
        <div class="coach-icon">👤</div>
        <div class="coach-title">Laster...</div>
        <div class="coach-desc">Henter spillerdata</div>
      </div>
    </section>

    <button onclick="goBack()" class="logout-btn">
      Tilbake
    </button>

  </main>

<script type="module">

import { db } from "./firebase-refleksjon.js";

import {
  collection,
  getDocs,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

const logList = document.getElementById("logList");

function goBack() {
  window.location.href = "fremside.html";
}
window.goBack = goBack;

async function loadUsersWithLogins() {
  const usersSnap = await getDocs(collection(db, "users"));

  const rows = [];

  for (const docSnap of usersSnap.docs) {
    const data = docSnap.data();
    const userId = docSnap.id;

    const name = data.name || "Ukjent";

    const lastActive = data.lastActiveAt
      ? data.lastActiveAt.toDate()
      : null;

    // 🔥 hent login historikk
    const sessionsRef = collection(db, "userLogins", userId, "sessions");
    const sessionsSnap = await getDocs(sessionsRef);

    const logins = [];

    sessionsSnap.forEach(s => {
      const d = s.data();
      if (!d.loginAt) return;

      const t = d.loginAt.toDate
        ? d.loginAt.toDate()
        : new Date(d.loginAt);

      logins.push(t);
    });

    logins.sort((a, b) => b - a);

    rows.push({
      name,
      lastActive,
      logins
    });
  }

  return rows;
}

function renderUsers(rows) {
  logList.innerHTML = "";

  const now = new Date();

  // sorter etter aktivitet
  rows.sort((a, b) => (b.lastActive || 0) - (a.lastActive || 0));

  rows.forEach(r => {

    const diffMin = r.lastActive
      ? (now - r.lastActive) / (1000 * 60)
      : 999;

    let statusColor = "#ef4444"; // 🔴 offline
    let statusText = "Offline";

    if (diffMin < 2) {
      statusColor = "#22c55e";
      statusText = "Online nå";
    } else if (diffMin < 10) {
      statusColor = "#f59e0b";
      statusText = "Nylig aktiv";
    }

    const timeText = r.lastActive
      ? r.lastActive.toLocaleString("no-NO")
      : "Ukjent";

    const history = r.logins
      .slice(0, 5)
      .map(t => `<div>${t.toLocaleString("no-NO")}</div>`)
      .join("");

    const div = document.createElement("div");
    div.className = "coach-card";

    div.innerHTML = `
      <div class="coach-icon">👤</div>
      <div class="coach-title" style="color:${statusColor}">
        ${r.name}
      </div>
      <div class="coach-desc">
        ${statusText}<br>
        Sist aktiv: ${timeText}
      </div>
      <div style="margin-top:8px; font-size:13px; opacity:0.8">
        <strong>Innlogginger:</strong>
        ${history || "Ingen logg"}
      </div>
    `;

    logList.appendChild(div);
  });

  if (rows.length === 0) {
    logList.innerHTML = `
      <div class="coach-card">
        <div class="coach-title">Ingen spillere funnet</div>
        <div class="coach-desc">Ingen aktivitet enda</div>
      </div>
    `;
  }
}

const auth = getAuth();

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  // 🔥 live oppdatering på aktivitet
  onSnapshot(collection(db, "users"), async () => {
    const rows = await loadUsersWithLogins();
    renderUsers(rows);
  });
});

</script>

</body>
</html>
