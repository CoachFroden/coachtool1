<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spillerlogg</title>

  <link rel="stylesheet" href="coach.css" />
</head>

<body>

  <main class="coach-container">

    <header class="coach-header">
      <h1>Spillerlogg</h1>
      <p class="coach-sub">Hvem har vært inne i appen</p>
    </header>

    <section id="logList" class="coach-grid">
      <div class="coach-card">
        <div class="coach-icon">👤</div>
        <div class="coach-title">Laster...</div>
        <div class="coach-desc">Henter spillerdata</div>
      </div>
    </section>

    <button onclick="goBack()" class="logout-btn">
      Tilbake
    </button>

  </main>

<script type="module">

"use strict";

import { auth, db } from "./firebase-refleksjon.js";
import {
  collection,
  query,
  where,
  getDocs,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

// 🔥 GLOBAL SESSION
let trackingStarted = false;
let sessionRef = null;

// 🔥 OPPDATER ONLINE STATUS
async function updateLastActive(user) {
  if (!user) return;

  await setDoc(
    doc(db, "users", user.uid),
    {
      lastActiveAt: serverTimestamp()
    },
    { merge: true }
  );
}

// 🔥 START SESSION TRACKING
async function startTracking(user){
  if(trackingStarted) return;
  trackingStarted = true;

  // 🔹 lag ny session
  sessionRef = doc(collection(db, "users", user.uid, "activitySessions"));

  await setDoc(sessionRef, {
    start: serverTimestamp(),
    lastActive: serverTimestamp()
  });

  // 🔹 oppdater hvert 30 sek
  setInterval(() => {

    if (!auth.currentUser) return;

    // 🔥 oppdater online status
    setDoc(
      doc(db, "users", user.uid),
      { lastActiveAt: serverTimestamp() },
      { merge: true }
    );

    // 🔥 oppdater session
    setDoc(sessionRef, {
      lastActive: serverTimestamp()
    }, { merge: true });

  }, 30000);
}

// 🔥 AUTH
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  // 🔥 første ping
  updateLastActive(user);

  // 🔥 start tracking + session
  startTracking(user);

  // 🔹 hent spillerinfo
  const q = query(
    collection(db, "spillere"),
    where("uid", "==", user.uid)
  );

  const snap = await getDocs(q);

  if (snap.empty) return;

  const player = snap.docs[0].data();

  const nameEl = document.getElementById("player-name");
  const roleEl = document.getElementById("player-role");

  if (nameEl && roleEl) {
    nameEl.textContent = player.navn;
    roleEl.textContent = player.rolle || "";
  }
});

// NAV
window.goTo = function(page){
  window.location.href = page;
};

// LOGOUT
const logoutBtn = document.getElementById("logoutBtn");

if (logoutBtn) {
  logoutBtn.onclick = () => {
    auth.signOut().then(() => {
      window.location.href = "index.html";
    });
  };
}

window.goBack = function() {
  window.location.href = "minside.html";
};

</script>

</body>
</html>
