<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spillerlogg</title>

  <link rel="stylesheet" href="coach.css" />
</head>

<body>

  <main class="coach-container">

    <header class="coach-header">
      <h1>Spillerlogg</h1>
      <p class="coach-sub">Hvem har vært inne i appen</p>
    </header>

    <section id="logList" class="coach-grid">
      <div class="coach-card">
        <div class="coach-icon">👤</div>
        <div class="coach-title">Laster...</div>
        <div class="coach-desc">Henter spillerdata</div>
      </div>
    </section>

    <button onclick="goBack()" class="logout-btn">
      Tilbake
    </button>

  </main>

<script type="module">

import { db } from "./firebase-refleksjon.js";

import {
  collection,
  getDocs,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

const logList = document.getElementById("logList");

function goBack() {
  window.location.href = "fremside.html";
}
window.goBack = goBack;

/* =========================
   HENT DATA (ROBUST)
========================= */
async function loadUsersWithSessions() {
  const usersSnap = await getDocs(collection(db, "users"));

  const rows = [];

  for (const docSnap of usersSnap.docs) {
    try {
      const data = docSnap.data();
      const userId = docSnap.id;

      const name = data.name || "Ukjent";

      const lastActive = data.lastActiveAt
        ? data.lastActiveAt.toDate()
        : null;

      // 🔥 hent sessions
      const sessionsRef = collection(db, "users", userId, "activitySessions");

      let sessions = [];

      try {
        const sessionsSnap = await getDocs(sessionsRef);

        sessionsSnap.forEach(s => {
          const d = s.data();

          if (!d.start || !d.lastActive) return;

          sessions.push({
            start: d.start.toDate(),
            lastActive: d.lastActive.toDate()
          });
        });

      } catch (e) {
        console.warn("Sessions mangler for:", userId);
      }

      sessions.sort((a, b) => b.lastActive - a.lastActive);

      rows.push({
        name,
        lastActive,
        sessions
      });

    } catch (err) {
      console.error("Feil bruker:", docSnap.id, err);
    }
  }

  return rows;
}

/* =========================
   RENDER UI
========================= */
function renderUsers(rows) {
  logList.innerHTML = "";

  const now = new Date();

  rows.sort((a, b) => (b.lastActive || 0) - (a.lastActive || 0));

  rows.forEach(r => {

    const diffMin = r.lastActive
      ? (now - r.lastActive) / (1000 * 60)
      : 999;

    let statusColor = "#ef4444";
    let statusText = "Offline";

    if (diffMin < 2) {
      statusColor = "#22c55e";
      statusText = "Online nå";
    } else if (diffMin < 10) {
      statusColor = "#f59e0b";
      statusText = "Nylig aktiv";
    }

    const timeText = r.lastActive
      ? r.lastActive.toLocaleString("no-NO")
      : "Ukjent";

    // 🔥 siste session
    const latestSession = r.sessions[0];

    let sessionText = "Ingen økter";

    if (latestSession) {
      const durationMin = Math.floor(
        (latestSession.lastActive - latestSession.start) / (1000 * 60)
      );

      sessionText = `${latestSession.start.toLocaleTimeString("no-NO")} - ${latestSession.lastActive.toLocaleTimeString("no-NO")} (${durationMin} min)`;
    }

    const div = document.createElement("div");
    div.className = "coach-card";

    div.innerHTML = `
      <div class="coach-icon">👤</div>
      <div class="coach-title" style="color:${statusColor}">
        ${r.name}
      </div>
      <div class="coach-desc">
        ${statusText}<br>
        Sist aktiv: ${timeText}<br>
        <small>${sessionText}</small>
      </div>
    `;

    logList.appendChild(div);
  });

  if (rows.length === 0) {
    logList.innerHTML = `
      <div class="coach-card">
        <div class="coach-title">Ingen spillere</div>
        <div class="coach-desc">Ingen aktivitet enda</div>
      </div>
    `;
  }
}

/* =========================
   AUTH + LIVE UPDATE
========================= */
const auth = getAuth();

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  onSnapshot(collection(db, "users"), async () => {
    const rows = await loadUsersWithSessions();
    renderUsers(rows);
  });
});

</script>

</body>
</html>
