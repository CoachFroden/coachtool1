<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spillerlogg</title>

  <link rel="stylesheet" href="coach.css" />
</head>

<body>

  <main class="coach-container">

    <header class="coach-header">
      <h1>Spillerlogg</h1>
      <p class="coach-sub">Hvem har vært inne i appen</p>
    </header>

    <!-- 🔹 LOGG LISTE -->
    <section id="logList" class="coach-grid">
      
      <!-- Midlertidig test -->
      <div class="coach-card">
        <div class="coach-icon">👤</div>
        <div class="coach-title">Laster...</div>
        <div class="coach-desc">Henter spillerdata</div>
      </div>

    </section>

    <!-- 🔙 TILBAKE -->
    <button onclick="goBack()" class="logout-btn">
      Tilbake
    </button>

  </main>

<script type="module">

import { db } from "./firebase-refleksjon.js";

import {
  collection,
  getDocs,
  getDoc,
  doc,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js"

const logList = document.getElementById("logList");

function goBack() {
  window.location.href = "fremside.html";
}

window.goBack = goBack;

// 🔥 HENT OG VIS LOGG
async function loadLog() {
  logList.innerHTML = "";

  const usersSnap = await getDocs(collection(db, "userLogins"));
console.log("ANTALL USERS:", usersSnap.size);
  const rows = [];

  for (const userDoc of usersSnap.docs) {
    const userId = userDoc.id;
  console.log("USER:", userId);
    // 🔹 Hent siste session per bruker
    const sessionsRef = collection(db, "userLogins", userId, "sessions");

    const q = query(
  sessionsRef,
  orderBy("loginAt", "desc"),
  limit(1)
);

const sessionsSnap = await getDocs(sessionsRef);

    if (sessionsSnap.empty) continue;

    const sessionData = sessionsSnap.docs[0].data();
    let ts = null;

if (sessionData.loginAt) {
  if (typeof sessionData.loginAt.toDate === "function") {
    ts = sessionData.loginAt.toDate();
  } else {
    ts = new Date(sessionData.loginAt);
  }
}

    // 🔹 Hent navn fra users
    let name = userId;
    try {
      const userSnap = await getDoc(doc(db, "users", userId));
      if (userSnap.exists()) {
        name = userSnap.data().name || name;
      }
    } catch (e) {
      console.warn("Kunne ikke hente navn for", userId);
    }

let latestTime = null;

sessionsSnap.forEach(docSnap => {
  const d = docSnap.data();

  if (!d.loginAt) return;

  const ts = d.loginAt.toDate
    ? d.loginAt.toDate()
    : new Date(d.loginAt);

  if (!latestTime || ts > latestTime) {
    latestTime = ts;
  }
});

// 🔥 legg til ÉN rad med siste login
if (latestTime) {
  rows.push({
  name,
  userId,
  time: latestTime,
  count: sessionsSnap.size
});
}
  }

  // 🔥 sorter etter siste aktivitet
  rows.sort((a, b) => (b.time || 0) - (a.time || 0));

  // 🔹 render
  rows.forEach(r => {
  const formatted = r.time
    ? r.time.toLocaleString("no-NO")
    : "Ukjent tid";

  const div = document.createElement("div");
  div.className = "coach-card";

  // 🔥 skjult historikk
  const historyDiv = document.createElement("div");
  historyDiv.style.display = "none";
  historyDiv.style.marginTop = "10px";
  historyDiv.style.fontSize = "14px";

  // 🔥 legg inn historikk (hentet på nytt)
  const sessionsRef = collection(db, "userLogins", r.userId, "sessions");

getDocs(sessionsRef).then(snap => {

  const times = [];

  snap.forEach(docSnap => {
    const d = docSnap.data();

    if (!d.loginAt) return;

    const t = d.loginAt.toDate
      ? d.loginAt.toDate()
      : new Date(d.loginAt);

    times.push(t);
  });

  // 🔥 sorter nyeste først
  times.sort((a, b) => b - a);

  // 🔥 render
  times.forEach(t => {
    const line = document.createElement("div");
    line.textContent = t.toLocaleString("no-NO");
    historyDiv.appendChild(line);
  });

});

  div.innerHTML = `
    <div class="coach-icon">👤</div>
    <div class="coach-title">${r.name}</div>
    <div class="coach-desc">
      Sist aktiv: ${formatted}<br>
      ${r.count} innlogginger
    </div>
  `;

  // 🔥 klikk = toggle historikk
  div.onclick = () => {
    historyDiv.style.display =
      historyDiv.style.display === "none" ? "block" : "none";
  };

  div.appendChild(historyDiv);
  logList.appendChild(div);
});

  if (rows.length === 0) {
    logList.innerHTML = `
      <div class="coach-card">
        <div class="coach-title">Ingen data enda</div>
        <div class="coach-desc">Be en spiller logge inn</div>
      </div>
    `;
  }
}

import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js"

const auth = getAuth();

onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "index.html"; // eller login-side
    return;
  }

  // 🔥 KUN når bruker er logget inn
  loadLog();
});

</script>

</body>
</html>
