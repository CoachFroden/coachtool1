<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spillerlogg</title>

  <link rel="stylesheet" href="coach.css" />
</head>

<body>

  <main class="coach-container">

    <header class="coach-header">
      <h1>Spillerlogg</h1>
      <p class="coach-sub">Hvem har vært inne i appen</p>
    </header>

    <section id="logList" class="coach-grid">
      <div class="coach-card">
        <div class="coach-icon">👤</div>
        <div class="coach-title">Laster...</div>
        <div class="coach-desc">Henter spillerdata</div>
      </div>
    </section>

    <button onclick="goBack()" class="logout-btn">
      Tilbake
    </button>

  </main>

<script type="module">

import { db } from "./firebase-refleksjon.js";

import {
  collection,
  getDocs,
  getDoc,
  doc,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

const logList = document.getElementById("logList");

function goBack() {
  window.location.href = "fremside.html";
}
window.goBack = goBack;

async function loadLog() {
  logList.innerHTML = "";

  const usersSnap = await getDocs(collection(db, "userLogins"));

  const rows = [];

  for (const userDoc of usersSnap.docs) {
    const userId = userDoc.id;

    const sessionsRef = collection(db, "userLogins", userId, "sessions");

const q = query(
  sessionsRef,
  orderBy("loginAt", "desc"),
  limit(1)
);

// 🔹 hent siste login
const latestSnap = await getDocs(q);

// 🔹 hent alle sessions (for count)
const allSnap = await getDocs(sessionsRef);

if (allSnap.empty) continue;

const sessionData = latestSnap.docs[0]?.data();

    let latestTime = null;

    if (sessionData.loginAt) {
      latestTime = sessionData.loginAt.toDate
        ? sessionData.loginAt.toDate()
        : new Date(sessionData.loginAt);
    }

    // 🔥 hent aktivitet
    const userSnap = await getDoc(doc(db, "users", userId));

    let lastActive = null;

    if (userSnap.exists() && userSnap.data().lastActiveAt) {
      const ts = userSnap.data().lastActiveAt;

      lastActive = ts.toDate
        ? ts.toDate()
        : new Date(ts);
    }

    // 🔹 navn
    let name = userId;
    if (userSnap.exists()) {
      name = userSnap.data().name || name;
    }

   rows.push({
  name,
  userId,
  time: latestTime,
  lastActive,
  count: allSnap.size
});
  }

  rows.sort((a, b) => (b.lastActive || b.time || 0) - (a.lastActive || a.time || 0));

  rows.forEach(r => {

    const formatted = r.time
      ? r.time.toLocaleString("no-NO")
      : "Ukjent tid";

    const latestActivity = r.lastActive && r.time
  ? (r.lastActive > r.time ? r.lastActive : r.time)
  : (r.lastActive || r.time);

const activeFormatted = latestActivity
  ? latestActivity.toLocaleString("no-NO")
  : "Ukjent tid";

    const now = new Date();
    const diffHours = r.lastActive
      ? (now - r.lastActive) / (1000 * 60 * 60)
      : 999;

    let statusColor = "#ef4444"; // rød
    if (diffHours < 24) statusColor = "#22c55e";
    else if (diffHours < 72) statusColor = "#f59e0b";

    const div = document.createElement("div");
    div.className = "coach-card";

    const historyDiv = document.createElement("div");
    historyDiv.style.display = "none";
    historyDiv.style.marginTop = "10px";
    historyDiv.style.fontSize = "14px";

    // 🔹 hent full historikk
    const sessionsRef = collection(db, "userLogins", r.userId, "sessions");

    getDocs(sessionsRef).then(snap => {
      const times = [];

      snap.forEach(docSnap => {
        const d = docSnap.data();

        if (!d.loginAt) return;

        const t = d.loginAt.toDate
          ? d.loginAt.toDate()
          : new Date(d.loginAt);

        times.push(t);
      });

      times.sort((a, b) => b - a);

      times.forEach(t => {
        const line = document.createElement("div");
        line.textContent = t.toLocaleString("no-NO");
        historyDiv.appendChild(line);
      });
    });

    div.innerHTML = `
      <div class="coach-icon">👤</div>
      <div class="coach-title" style="color:${statusColor}">
        ${r.name}
      </div>
      <div class="coach-desc">
        Sist aktiv: ${activeFormatted}<br>
        ${r.count} innlogginger
      </div>
    `;

    div.onclick = () => {
      historyDiv.style.display =
        historyDiv.style.display === "none" ? "block" : "none";
    };

    div.appendChild(historyDiv);
    logList.appendChild(div);
  });

  if (rows.length === 0) {
    logList.innerHTML = `
      <div class="coach-card">
        <div class="coach-title">Ingen data enda</div>
        <div class="coach-desc">Be en spiller logge inn</div>
      </div>
    `;
  }
}

const auth = getAuth();

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  loadLog();
});

</script>

</body>
</html>
